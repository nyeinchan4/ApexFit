name: Docker Build & Push — API Gateway

on:
  push:
    branches: [master]
    paths:
      - services/api-gateway/**
      - .github/workflows/apexfit-api-gateway-dev-ci.yml
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./services/api-gateway
          file: ./services/api-gateway/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/apexfit-api-gateway:latest
            ${{ secrets.DOCKER_USERNAME }}/apexfit-api-gateway:sha-${{ github.sha }}
