name: Docker Build & Push — Member App

on:
  push:
    branches: [main]
    paths:
      - frontend/member-app/**
      - .github/workflows/docker-member-app.yml
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/member-app
          file: ./frontend/member-app/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/apexfit-member-app:latest
            ${{ secrets.DOCKER_USERNAME }}/apexfit-member-app:sha-${{ github.sha }}
