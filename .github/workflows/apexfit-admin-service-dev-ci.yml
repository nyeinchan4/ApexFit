name: Docker Build & Push — Admin Service

on:
  push:
    branches: [master]
    paths:
      - services/admin-service/**
      - .github/workflows/apexfit-admin-service-dev-ci.yml
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./services/admin-service
          file: ./services/admin-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/apexfit-admin-service:latest
            ${{ secrets.DOCKER_USERNAME }}/apexfit-admin-service:sha-${{ github.sha }}
