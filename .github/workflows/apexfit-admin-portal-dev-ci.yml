name: Docker Build & Push — Admin Portal

on:
  push:
    branches: [main]
    paths:
      - frontend/admin-portal/**
      - .github/workflows/docker-admin-portal.yml
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/admin-portal
          file: ./frontend/admin-portal/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/apexfit-admin-portal:latest
            ${{ secrets.DOCKER_USERNAME }}/apexfit-admin-portal:sha-${{ github.sha }}
