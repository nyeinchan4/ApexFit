<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ApexFit Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;family=Lexend:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "electric-orange": "#FF5722",
                        "on-primary-fixed-variant": "#862200",
                        "outline": "#ab8980",
                        "primary-fixed-dim": "#ffb5a0",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed-variant": "#004c6d",
                        "surface-container-lowest": "#180b07",
                        "background": "#1e100c",
                        "on-background": "#fadcd4",
                        "surface-dim": "#1e100c",
                        "secondary-fixed": "#e0e0ff",
                        "on-error-container": "#ffdad6",
                        "surface-container": "#2c1c17",
                        "admin-surface": "#FFFFFF",
                        "on-tertiary": "#00344c",
                        "secondary": "#bdc2ff",
                        "tertiary-container": "#019ad8",
                        "status-expired": "#F44336",
                        "surface": "#1e100c",
                        "inverse-on-surface": "#3e2c27",
                        "primary-container": "#ff5722",
                        "surface-variant": "#43302b",
                        "surface-container-highest": "#43302b",
                        "surface-container-high": "#372621",
                        "primary-fixed": "#ffdbd1",
                        "on-secondary": "#1b247f",
                        "on-error": "#690005",
                        "on-primary-container": "#541200",
                        "on-primary-fixed": "#3b0900",
                        "surface-container-low": "#271813",
                        "inverse-surface": "#fadcd4",
                        "deep-navy": "#1A237E",
                        "admin-bg": "#F8F9FA",
                        "secondary-container": "#343d96",
                        "surface-bright": "#483530",
                        "primary": "#ffb5a0",
                        "on-tertiary-fixed": "#001e2e",
                        "on-tertiary-container": "#002d43",
                        "tertiary-fixed-dim": "#86cfff",
                        "status-active": "#4CAF50",
                        "on-surface-variant": "#e4beb4",
                        "member-surface": "#1E1E1E",
                        "on-surface": "#fadcd4",
                        "tertiary-fixed": "#c8e6ff",
                        "tertiary": "#86cfff",
                        "outline-variant": "#5b4039",
                        "inverse-primary": "#b02f00",
                        "on-secondary-container": "#a8afff",
                        "error-container": "#93000a",
                        "status-pending": "#FFC107",
                        "on-secondary-fixed": "#000767",
                        "surface-tint": "#ffb5a0",
                        "secondary-fixed-dim": "#bdc2ff",
                        "member-bg": "#121212",
                        "on-secondary-fixed-variant": "#343d96",
                        "on-primary": "#5f1500"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "gutter": "16px",
                        "container-margin-mobile": "16px",
                        "touch-target-min": "44px",
                        "container-margin-desktop": "32px"
                    },
                    "fontFamily": {
                        "body-sm": ["inter"],
                        "display-lg": ["lexend"],
                        "body-lg": ["inter"],
                        "headline-md": ["lexend"],
                        "label-bold": ["inter"],
                        "stats-num": ["lexend"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-lg": ["40px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "label-bold": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "stats-num": ["32px", { "lineHeight": "1.0", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-member-bg text-on-surface font-body-lg min-h-screen pb-24 pt-16">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-zinc-950/80 backdrop-blur-md shadow-[0_4px_20px_rgba(255,87,34,0.15)] flex justify-between items-center px-4 h-16">
<div class="flex items-center gap-3">
<img alt="Member profile photo" class="w-10 h-10 rounded-full border border-zinc-800 object-cover" data-alt="close up portrait of a young woman with a confident expression, dramatic gym lighting, dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6lb8N1AgGQTG4p4Uc8pPwYeiI9MnBJXTaAcEHQpTkWYMGUhF1kyVbK5N_MEYrdvWaP1hYuGjsexmF-MTDfA5i_8-j-Z-WNVh3Dd4HYGCEHb2eHEILu7JdD4iSpOot9cJQZes4iYlFNJBTzTdf29lrNQiIsG8iR8jWue-oYHRpxtjNef0Re8TgxfP3s52PazSn0fNXsAb2SZam3M_9WsKY9Iyxi92bwxXQ8zzkfX4-ZodZvHjFxFZAqBONJJpeSwLyWRStgk4dQYA"/>
</div>
<div class="absolute left-1/2 -translate-x-1/2">
<h1 class="text-2xl font-black text-orange-500 italic tracking-tighter">ApexFit</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center text-orange-600 dark:text-orange-500 hover:bg-zinc-800 transition-colors rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content -->
<main class="px-container-margin-mobile md:px-container-margin-desktop py-6 max-w-lg mx-auto w-full">
<!-- Welcome Section -->
<div class="mb-8 flex justify-between items-end">
<div>
<p class="font-body-sm text-on-surface-variant mb-1">Good Morning,</p>
<h2 class="font-headline-md text-headline-md">Alex Johnson</h2>
</div>
<div class="bg-surface-variant px-3 py-1.5 rounded-full border border-outline-variant flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-electric-orange shadow-[0_0_8px_rgba(255,87,34,0.6)]"></span>
<span class="font-label-bold text-label-bold text-electric-orange">Premium Member</span>
</div>
</div>
<!-- Expiry Gauge Bento Card -->
<div class="bg-member-surface rounded-xl border border-surface-container p-6 mb-6 shadow-lg relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-electric-orange opacity-5 rounded-full blur-2xl -mr-10 -mt-10"></div>
<div class="flex flex-col items-center justify-center relative z-10">
<h3 class="font-body-sm text-body-sm text-on-surface-variant mb-4">Membership Status</h3>
<!-- SVG Gauge -->
<div class="relative w-48 h-48 mb-4">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<circle class="text-surface-container" cx="50" cy="50" fill="none" r="40" stroke="currentColor" stroke-width="8"></circle>
<circle class="text-electric-orange" cx="50" cy="50" fill="none" r="40" stroke="currentColor" stroke-dasharray="251.2" stroke-dashoffset="62.8" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center text-center">
<span class="font-stats-num text-stats-num text-on-surface">14</span>
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-widest mt-1">Days Left</span>
</div>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant bg-surface-container-low px-4 py-2 rounded-lg">Expires on <strong class="text-on-surface">May 15</strong></p>
</div>
</div>
<!-- Quick Stats Grid -->
<div class="grid grid-cols-2 gap-4 mb-8">
<div class="bg-member-surface rounded-xl border border-surface-container p-4">
<div class="flex items-center gap-2 text-on-surface-variant mb-2">
<span class="material-symbols-outlined text-electric-orange" data-icon="local_fire_department">local_fire_department</span>
<span class="font-label-bold text-label-bold">WORKOUTS</span>
</div>
<div class="flex items-end gap-2">
<span class="font-stats-num text-stats-num">12</span>
<span class="font-body-sm text-body-sm text-on-surface-variant pb-1">this month</span>
</div>
</div>
<div class="bg-member-surface rounded-xl border border-surface-container p-4">
<div class="flex items-center gap-2 text-on-surface-variant mb-2">
<span class="material-symbols-outlined text-electric-orange" data-icon="timer">timer</span>
<span class="font-label-bold text-label-bold">AVG DURATION</span>
</div>
<div class="flex items-end gap-2">
<span class="font-stats-num text-stats-num">45</span>
<span class="font-body-sm text-body-sm text-on-surface-variant pb-1">mins</span>
</div>
</div>
</div>
<!-- Motivation Banner -->
<div class="bg-surface-variant rounded-xl p-5 border-l-4 border-electric-orange">
<div class="flex gap-4 items-center">
<div class="bg-surface-container-high p-2 rounded-full text-electric-orange">
<span class="material-symbols-outlined" data-icon="bolt">bolt</span>
</div>
<div>
<h4 class="font-body-lg text-body-lg font-bold text-on-surface mb-1">Keep the momentum!</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant">You're 2 workouts away from your weekly goal.</p>
</div>
</div>
</div>
</main>
<!-- Floating Action Button for Scan -->
<div class="fixed bottom-24 right-4 z-40 md:hidden">
<button class="bg-electric-orange text-surface-container-lowest h-16 px-6 rounded-full font-label-bold text-label-bold flex items-center gap-2 shadow-[0_0_20px_rgba(255,87,34,0.4)] active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span>SCAN ENTRY</span>
</button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-2xl bg-zinc-950/95 backdrop-blur-lg shadow-[0_-4px_24px_rgba(0,0,0,0.5)] flex justify-around items-center h-20 px-2 pb-safe md:hidden">
<button class="flex flex-col items-center justify-center text-orange-500 drop-shadow-[0_0_8px_rgba(255,87,34,0.4)] hover:text-orange-400 active:scale-90 transition-transform w-touch-target-min h-touch-target-min">
<span class="material-symbols-outlined mb-1 text-2xl" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-['Lexend'] font-medium text-[10px]">Pulse</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-500 hover:text-orange-400 active:scale-90 transition-transform w-touch-target-min h-touch-target-min">
<span class="material-symbols-outlined mb-1 text-2xl" data-icon="calendar_today">calendar_today</span>
<span class="font-['Lexend'] font-medium text-[10px]">Bookings</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-500 hover:text-orange-400 active:scale-90 transition-transform w-touch-target-min h-touch-target-min">
<span class="material-symbols-outlined mb-1 text-2xl" data-icon="person">person</span>
<span class="font-['Lexend'] font-medium text-[10px]">Profile</span>
</button>
</nav>
</body></html>
