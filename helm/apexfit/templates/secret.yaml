apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "apexfit.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ── JWT Secrets ──────────────────────────────────────────
  JWT_ACCESS_SECRET: {{ .Values.secrets.jwtAccessSecret | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.jwtRefreshSecret | quote }}
  # ── PostgreSQL credentials ────────────────────────────────
  DB_USER: {{ .Values.postgresql.auth.username | quote }}
  DB_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
