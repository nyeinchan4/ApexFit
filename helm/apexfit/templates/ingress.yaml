{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Values.namespace.name }}
  labels:
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
    {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.certManager.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.certManager.clusterIssuer }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.hosts.api }}
        - {{ .Values.ingress.hosts.admin }}
        - {{ .Values.ingress.hosts.app }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    # ── API Gateway ──────────────────────────────────────
    - host: {{ .Values.ingress.hosts.api }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-backend-{{ .Values.ingress.services.apiGatewayName }}
                port:
                  number: {{ .Values.ingress.services.apiGatewayPort }}
    # ── Admin Portal ─────────────────────────────────────
    - host: {{ .Values.ingress.hosts.admin }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-frontend-{{ .Values.ingress.services.adminPortalName }}
                port:
                  number: {{ .Values.ingress.services.adminPortalPort }}
    # ── Member App ───────────────────────────────────────
    - host: {{ .Values.ingress.hosts.app }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-frontend-{{ .Values.ingress.services.memberAppName }}
                port:
                  number: {{ .Values.ingress.services.memberAppPort }}
{{- end }}
