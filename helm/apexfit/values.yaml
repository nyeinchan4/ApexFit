# ============================================================
# ApexFit — Umbrella Helm Chart Values (production defaults)
# ============================================================
# Override any value with:
#   helm install apexfit ./helm/apexfit -f my-values.yaml
#
# Sub-chart values are nested under their alias key:
#   database.*   → apexfit-database sub-chart
#   backend.*    → apexfit-backend sub-chart
#   frontend.*   → apexfit-frontend sub-chart
# ============================================================

# ─── Namespace (shared by all sub-charts) ─────────────────
namespace:
  create: true
  name: apexfit

# ─── Ingress (umbrella-level, routes to backend + frontend) ─
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  tls:
    enabled: false
    secretName: apexfit-tls
    certManager:
      enabled: false
      clusterIssuer: letsencrypt-prod
  hosts:
    api: api.apexfit.example.com
    admin: admin.apexfit.example.com
    app: app.apexfit.example.com
  # Service names used in ingress backend refs
  # format: <release-name>-<service-name>
  # These must match what backend/frontend sub-charts produce
  services:
    apiGatewayName: api-gateway
    apiGatewayPort: 3000
    adminPortalName: admin-portal
    adminPortalPort: 80
    memberAppName: member-app
    memberAppPort: 80

# ============================================================
# database sub-chart overrides (alias: database)
# ============================================================
database:
  namespace:
    name: apexfit

  secrets:
    jwtAccessSecret: "CHANGE_ME_access_secret"
    jwtRefreshSecret: "CHANGE_ME_refresh_secret"

  postgresql:
    enabled: true
    auth:
      username: postgres
      password: "changeme"        # CHANGE in production
      database: apexfit_users
    primary:
      initdb:
        scripts:
          init-db.sql: |
            SELECT 'CREATE DATABASE apexfit_memberships'
            WHERE NOT EXISTS (
                SELECT FROM pg_database WHERE datname = 'apexfit_memberships'
            )\gexec

            SELECT 'CREATE DATABASE apexfit_admin'
            WHERE NOT EXISTS (
                SELECT FROM pg_database WHERE datname = 'apexfit_admin'
            )\gexec
      persistence:
        enabled: true
        size: 8Gi
      resources:
        requests:
          memory: "256Mi"
          cpu: "250m"
        limits:
          memory: "512Mi"
          cpu: "500m"

# ============================================================
# backend sub-chart overrides (alias: backend)
# ============================================================
backend:
  namespace:
    name: apexfit

  global:
    imageRegistry: ""
    imagePullSecrets: []

  image:
    pullPolicy: IfNotPresent
    tag: latest

  # Name of the Secret created by the database sub-chart
  # Format: <database-release-name>-secrets
  sharedSecretName: "apexfit-database-secrets"

  # DB host produced by the database sub-chart
  # Format: <database-release-name>-postgresql
  database:
    host: "apexfit-database-postgresql"
    port: "5432"

  apiGateway:
    enabled: true
    name: api-gateway
    image:
      repository: apexfit/api-gateway
      tag: ""
    replicaCount: 2
    port: 3000
    env:
      NODE_ENV: "production"
      PORT: "3000"
      SERVICE_NAME: api-gateway
      ALLOWED_ORIGINS: "https://admin.apexfit.example.com,https://app.apexfit.example.com"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 60
    service:
      type: ClusterIP
    livenessProbe:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 15
      failureThreshold: 5
    readinessProbe:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 15
      failureThreshold: 5

  userService:
    enabled: true
    name: user-service
    image:
      repository: apexfit/user-service
      tag: ""
    replicaCount: 2
    port: 3001
    env:
      NODE_ENV: "production"
      PORT: "3001"
      DB_NAME: apexfit_users
      SERVICE_NAME: user-service
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "30d"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
    service:
      type: ClusterIP
    livenessProbe:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 15
      failureThreshold: 5
    readinessProbe:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 15
      failureThreshold: 5

  membershipService:
    enabled: true
    name: membership-service
    image:
      repository: apexfit/membership-service
      tag: ""
    replicaCount: 2
    port: 3002
    env:
      NODE_ENV: "production"
      PORT: "3002"
      DB_NAME: apexfit_memberships
      SERVICE_NAME: membership-service
      JWT_ACCESS_EXPIRES_IN: "15m"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
    service:
      type: ClusterIP
    livenessProbe:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 15
      failureThreshold: 5
    readinessProbe:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 15
      failureThreshold: 5

  adminService:
    enabled: true
    name: admin-service
    image:
      repository: apexfit/admin-service
      tag: ""
    replicaCount: 1
    port: 3003
    env:
      NODE_ENV: "production"
      PORT: "3003"
      DB_NAME: apexfit_admin
      SERVICE_NAME: admin-service
      JWT_ACCESS_EXPIRES_IN: "15m"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
    service:
      type: ClusterIP
    livenessProbe:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 15
      failureThreshold: 5
    readinessProbe:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 15
      failureThreshold: 5

# ============================================================
# frontend sub-chart overrides (alias: frontend)
# ============================================================
frontend:
  namespace:
    name: apexfit

  global:
    imageRegistry: ""
    imagePullSecrets: []

  image:
    pullPolicy: IfNotPresent
    tag: latest

  adminPortal:
    enabled: true
    name: admin-portal
    image:
      repository: apexfit/admin-portal
      tag: ""
    replicaCount: 1
    port: 80
    env:
      API_GATEWAY_HOST: ""
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
    service:
      type: ClusterIP
    livenessProbe:
      path: /
      initialDelaySeconds: 10
      periodSeconds: 20
    readinessProbe:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10

  memberApp:
    enabled: true
    name: member-app
    image:
      repository: apexfit/member-app
      tag: ""
    replicaCount: 1
    port: 80
    env:
      API_GATEWAY_HOST: ""
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
    service:
      type: ClusterIP
    livenessProbe:
      path: /
      initialDelaySeconds: 10
      periodSeconds: 20
    readinessProbe:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10
