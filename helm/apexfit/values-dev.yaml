# ============================================================
# ApexFit — values-dev.yaml
# Development overrides for the umbrella chart.
# Usage:
#   helm dependency update ./helm/apexfit
#   helm install apexfit ./helm/apexfit -f helm/apexfit/values-dev.yaml
# ============================================================

# ─── Namespace ────────────────────────────────────────────
namespace:
  create: true
  name: apexfit

# ─── Ingress — disabled in dev, use kubectl port-forward ──
ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  tls:
    enabled: false
    secretName: apexfit-tls
    certManager:
      enabled: false
      clusterIssuer: letsencrypt-prod
  hosts:
    api: api.apexfit.local
    admin: admin.apexfit.local
    app: app.apexfit.local
  services:
    apiGatewayName: api-gateway
    apiGatewayPort: 3000
    adminPortalName: admin-portal
    adminPortalPort: 80
    memberAppName: member-app
    memberAppPort: 80

# ============================================================
# database sub-chart (dev overrides)
# ============================================================
database:
  namespace:
    name: apexfit

  secrets:
    jwtAccessSecret: "dev_access_secret_not_for_production"
    jwtRefreshSecret: "dev_refresh_secret_not_for_production"

  postgresql:
    enabled: true
    image:
      tag: latest
    auth:
      username: postgres
      password: "changeme"
      database: apexfit_users
    primary:
      initdb:
        scripts:
          init-db.sql: |
            SELECT 'CREATE DATABASE apexfit_memberships'
            WHERE NOT EXISTS (
                SELECT FROM pg_database WHERE datname = 'apexfit_memberships'
            )\gexec

            SELECT 'CREATE DATABASE apexfit_admin'
            WHERE NOT EXISTS (
                SELECT FROM pg_database WHERE datname = 'apexfit_admin'
            )\gexec
      persistence:
        enabled: true
        size: 1Gi
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
          cpu: "250m"

# ============================================================
# backend sub-chart (dev overrides)
# ============================================================
backend:
  namespace:
    name: apexfit

  global:
    imageRegistry: ""
    imagePullSecrets: []

  image:
    pullPolicy: Always
    tag: latest

  # Secret name = <database-release-name>-secrets
  # When installing as umbrella: apexfit-database-secrets
  sharedSecretName: "apexfit-database-secrets"

  database:
    host: "apexfit-database-postgresql"
    port: "5432"

  apiGateway:
    enabled: true
    name: api-gateway
    image:
      repository: nyeinchan468/apexfit-api-gateway
      tag: "latest"
    replicaCount: 1
    port: 3000
    env:
      NODE_ENV: "development"
      PORT: "3000"
      SERVICE_NAME: api-gateway
      ALLOWED_ORIGINS: "http://localhost:8899,http://localhost:8900,http://localhost:3000"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"
    autoscaling:
      enabled: false
    service:
      type: ClusterIP
    livenessProbe:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 15
      failureThreshold: 5
    readinessProbe:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 15
      failureThreshold: 5

  userService:
    enabled: true
    name: user-service
    image:
      repository: nyeinchan468/apexfit-user-service
      tag: "latest"
    replicaCount: 1
    port: 3001
    env:
      NODE_ENV: "development"
      PORT: "3001"
      DB_NAME: apexfit_users
      SERVICE_NAME: user-service
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "30d"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"
    autoscaling:
      enabled: false
    service:
      type: ClusterIP
    livenessProbe:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 15
      failureThreshold: 5
    readinessProbe:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 15
      failureThreshold: 5

  membershipService:
    enabled: true
    name: membership-service
    image:
      repository: nyeinchan468/apexfit-membership-service
      tag: "latest"
    replicaCount: 1
    port: 3002
    env:
      NODE_ENV: "development"
      PORT: "3002"
      DB_NAME: apexfit_memberships
      SERVICE_NAME: membership-service
      JWT_ACCESS_EXPIRES_IN: "15m"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"
    autoscaling:
      enabled: false
    service:
      type: ClusterIP
    livenessProbe:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 15
      failureThreshold: 5
    readinessProbe:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 15
      failureThreshold: 5

  adminService:
    enabled: true
    name: admin-service
    image:
      repository: nyeinchan468/apexfit-admin-service
      tag: "latest"
    replicaCount: 1
    port: 3003
    env:
      NODE_ENV: "development"
      PORT: "3003"
      DB_NAME: apexfit_admin
      SERVICE_NAME: admin-service
      JWT_ACCESS_EXPIRES_IN: "15m"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"
    autoscaling:
      enabled: false
    service:
      type: ClusterIP
    livenessProbe:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 15
      failureThreshold: 5
    readinessProbe:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 15
      failureThreshold: 5

# ============================================================
# frontend sub-chart (dev overrides)
# ============================================================
frontend:
  namespace:
    name: apexfit

  global:
    imageRegistry: ""
    imagePullSecrets: []

  image:
    pullPolicy: Always
    tag: latest

  adminPortal:
    enabled: true
    name: admin-portal
    image:
      repository: nyeinchan468/apexfit-admin-portal
      tag: "latest"
    replicaCount: 1
    port: 80
    env:
      API_GATEWAY_HOST: "apexfit-backend-api-gateway"
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
    service:
      type: ClusterIP
    livenessProbe:
      path: /
      initialDelaySeconds: 10
      periodSeconds: 20
    readinessProbe:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10

  memberApp:
    enabled: true
    name: member-app
    image:
      repository: nyeinchan468/apexfit-member-app
      tag: "latest"
    replicaCount: 1
    port: 80
    env:
      API_GATEWAY_HOST: "apexfit-backend-api-gateway"
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
    service:
      type: ClusterIP
    livenessProbe:
      path: /
      initialDelaySeconds: 10
      periodSeconds: 20
    readinessProbe:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10
