# ============================================================
# ApexFit — values-dev.yaml
# Full override for local/development environments
# Usage:
#   helm install apexfit ./helm/apexfit -f helm/apexfit/values-dev.yaml
# ============================================================

# ─── Global settings ──────────────────────────────────────
global:
  imageRegistry: ""
  imagePullSecrets: []
  nodeEnv: development

# ─── Namespace ────────────────────────────────────────────
namespace:
  create: true
  name: apexfit

# ─── Image defaults ───────────────────────────────────────
image:
  pullPolicy: Always
  tag: latest

# ─── PostgreSQL (Bitnami sub-chart) ───────────────────────
# NOTE: Bitnami no longer publishes versioned tags (e.g. 17.6.0-debian-12-r4)
# to Docker Hub for free accounts. Pin to `latest` which resolves correctly.
postgresql:
  enabled: true
  image:
    tag: latest
  auth:
    username: postgres
    password: "changeme"
    database: apexfit_users
  primary:
    initdb:
      scripts:
        init-db.sql: |
          SELECT 'CREATE DATABASE apexfit_memberships'
          WHERE NOT EXISTS (
              SELECT FROM pg_database WHERE datname = 'apexfit_memberships'
          )\gexec

          SELECT 'CREATE DATABASE apexfit_admin'
          WHERE NOT EXISTS (
              SELECT FROM pg_database WHERE datname = 'apexfit_admin'
          )\gexec
    persistence:
      enabled: true
      size: 1Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"

# ─── Shared JWT secrets (non-sensitive, dev only) ─────────
secrets:
  jwtAccessSecret: "dev_access_secret_not_for_production"
  jwtRefreshSecret: "dev_refresh_secret_not_for_production"

# ─── Service: user-service ────────────────────────────────
userService:
  enabled: true
  name: user-service
  image:
    repository: nyeinchan468/apexfit-user-service
    tag: "latest"
  replicaCount: 1
  port: 3001
  env:
    NODE_ENV: "development"
    PORT: "3001"
    DB_NAME: apexfit_users
    SERVICE_NAME: user-service
    JWT_ACCESS_EXPIRES_IN: "15m"
    JWT_REFRESH_EXPIRES_IN: "30d"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  service:
    type: ClusterIP
  livenessProbe:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10

# ─── Service: membership-service ─────────────────────────
membershipService:
  enabled: true
  name: membership-service
  image:
    repository: nyeinchan468/apexfit-membership-service
    tag: "latest"
  replicaCount: 1
  port: 3002
  env:
    NODE_ENV: "development"
    PORT: "3002"
    DB_NAME: apexfit_memberships
    SERVICE_NAME: membership-service
    JWT_ACCESS_EXPIRES_IN: "15m"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  service:
    type: ClusterIP
  livenessProbe:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 15
    failureThreshold: 5
  readinessProbe:
    path: /health
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 15
    failureThreshold: 5

# ─── Service: admin-service ───────────────────────────────
adminService:
  enabled: true
  name: admin-service
  image:
    repository: nyeinchan468/apexfit-admin-service
    tag: "latest"
  replicaCount: 1
  port: 3003
  env:
    NODE_ENV: "development"
    PORT: "3003"
    DB_NAME: apexfit_admin
    SERVICE_NAME: admin-service
    JWT_ACCESS_EXPIRES_IN: "15m"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  service:
    type: ClusterIP
  livenessProbe:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 15
    failureThreshold: 5
  readinessProbe:
    path: /health
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 15
    failureThreshold: 5

# ─── Service: api-gateway ────────────────────────────────
apiGateway:
  enabled: true
  name: api-gateway
  image:
    repository: nyeinchan468/apexfit-api-gateway
    tag: "latest"
  replicaCount: 1
  port: 3000
  env:
    NODE_ENV: "development"
    PORT: "3000"
    SERVICE_NAME: api-gateway
    ALLOWED_ORIGINS: "http://localhost:8899,http://localhost:8900,http://localhost:3000"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 60
  service:
    type: ClusterIP
  livenessProbe:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 15
    failureThreshold: 5
  readinessProbe:
    path: /health
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 15
    failureThreshold: 5

# ─── Frontend: admin-portal ───────────────────────────────
adminPortal:
  enabled: true
  name: admin-portal
  image:
    repository: nyeinchan468/apexfit-admin-portal
    tag: "latest"
  replicaCount: 1
  port: 80
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  service:
    type: ClusterIP
  env:
    API_GATEWAY_HOST: "release-1-api-gateway"
  livenessProbe:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20
  readinessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10

# ─── Frontend: member-app ─────────────────────────────────
memberApp:
  enabled: true
  name: member-app
  image:
    repository: nyeinchan468/apexfit-member-app
    tag: "latest"
  replicaCount: 1
  port: 80
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  service:
    type: ClusterIP
  env:
    API_GATEWAY_HOST: "release-1-api-gateway"
  livenessProbe:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20
  readinessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10

# ─── InfraDashboard ───────────────────────────────────────
infraDashboard:
  enabled: true
  name: infradashboard
  image:
    repository: nyeinchan468/infradashboard
    tag: "latest"
  replicaCount: 1
  port: 80
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  service:
    type: ClusterIP
  livenessProbe:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20
  readinessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10

# ─── Ingress ─────────────────────────────────────────────
# Disabled in dev — use kubectl port-forward instead
ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  tls:
    enabled: false
    secretName: apexfit-tls
    certManager:
      enabled: false
      clusterIssuer: letsencrypt-prod
  hosts:
    api: api.apexfit.local
    admin: admin.apexfit.local
    app: app.apexfit.local
