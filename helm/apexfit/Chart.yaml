apiVersion: v2
name: apexfit
description: |
  ApexFit umbrella chart.
  Composes: apexfit-database, apexfit-backend, apexfit-frontend.
  Only namespace and Ingress resources live here.
type: application
version: 0.2.0
appVersion: "1.0.0"
keywords:
  - apexfit
  - fitness
  - microservices
  - nodejs
maintainers:
  - name: ApexFit Team

dependencies:
  # ── Database (PostgreSQL + shared Secret) ──────────────
  - name: apexfit-database
    version: "0.1.0"
    repository: "file://../apexfit-database"
    alias: database

  # ── Backend (api-gateway + microservices) ───────────────
  - name: apexfit-backend
    version: "0.1.0"
    repository: "file://../apexfit-backend"
    alias: backend

  # ── Frontend (admin-portal + member-app) ────────────────
  - name: apexfit-frontend
    version: "0.1.0"
    repository: "file://../apexfit-frontend"
    alias: frontend
