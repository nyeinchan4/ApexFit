# ============================================================
# apexfit-database — values-dev.yaml
# Development overrides for the database sub-chart.
# Usage (standalone):
#   helm install apexfit-db ./helm/apexfit-database \
#     -f helm/apexfit-database/values-dev.yaml
# ============================================================

# ─── Namespace ────────────────────────────────────────────
namespace:
  name: apexfit

# ─── Shared credentials ───────────────────────────────────
# ⚠️  SECURITY: Do NOT put real secrets here — this file is committed to git.
# Real secrets are managed directly as a Kubernetes Secret via kubectl.
# See: scripts/apply-secrets.sh  or  .secrets.env (gitignored, local only)
# To bootstrap: kubectl apply -f - <<< $(cat scripts/k8s-secrets-template.yaml)
secrets:
  jwtAccessSecret: "CHANGEME_OVERRIDE_VIA_KUBECTL"
  jwtRefreshSecret: "CHANGEME_OVERRIDE_VIA_KUBECTL"

# ─── PostgreSQL (Bitnami sub-chart) ───────────────────────
postgresql:
  enabled: true
  image:
    tag: latest          # Bitnami free-tier doesn't publish versioned tags

  auth:
    username: postgres
    password: "CHANGEME_OVERRIDE_VIA_KUBECTL"  # real value managed via kubectl secret
    database: apexfit_users

  primary:
    initdb:
      scripts:
        init-db.sql: |
          SELECT 'CREATE DATABASE apexfit_memberships'
          WHERE NOT EXISTS (
              SELECT FROM pg_database WHERE datname = 'apexfit_memberships'
          )\gexec

          SELECT 'CREATE DATABASE apexfit_admin'
          WHERE NOT EXISTS (
              SELECT FROM pg_database WHERE datname = 'apexfit_admin'
          )\gexec

    persistence:
      enabled: true
      size: 1Gi           # smaller PVC for dev

    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"

# ─── External PostgreSQL (disabled in dev) ────────────────
externalPostgresql:
  host: ""
  port: 5432
