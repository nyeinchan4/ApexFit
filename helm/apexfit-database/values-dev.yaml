# ============================================================
# apexfit-database — values-dev.yaml
# Development overrides for the database sub-chart.
# Usage (standalone):
#   helm install apexfit-db ./helm/apexfit-database \
#     -f helm/apexfit-database/values-dev.yaml
# ============================================================

# ─── Namespace ────────────────────────────────────────────
namespace:
  name: apexfit

# ─── Shared credentials ───────────────────────────────────
# ✅ SEALED SECRETS: apexfit-database-secrets is now managed as a SealedSecret
# in helm/apexfit-database/templates/sealed-secret.yaml (safe to commit to git).
# To rotate secrets: update .secrets.env then run scripts/rotate-sealed-secret.sh
# Values below are unused but kept so Helm chart schema validation passes.
secrets:
  jwtAccessSecret: "UNUSED_MANAGED_BY_SEALED_SECRETS"
  jwtRefreshSecret: "UNUSED_MANAGED_BY_SEALED_SECRETS"

# ─── PostgreSQL (Bitnami sub-chart) ───────────────────────
postgresql:
  enabled: true
  image:
    tag: latest          # Bitnami free-tier doesn't publish versioned tags

  auth:
    username: postgres
    password: "UNUSED_MANAGED_BY_SEALED_SECRETS"  # real value managed via SealedSecret
    database: apexfit_users

  primary:
    initdb:
      scripts:
        init-db.sql: |
          SELECT 'CREATE DATABASE apexfit_memberships'
          WHERE NOT EXISTS (
              SELECT FROM pg_database WHERE datname = 'apexfit_memberships'
          )\gexec

          SELECT 'CREATE DATABASE apexfit_admin'
          WHERE NOT EXISTS (
              SELECT FROM pg_database WHERE datname = 'apexfit_admin'
          )\gexec

    persistence:
      enabled: true
      size: 1Gi           # smaller PVC for dev

    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"

# ─── External PostgreSQL (disabled in dev) ────────────────
externalPostgresql:
  host: ""
  port: 5432
