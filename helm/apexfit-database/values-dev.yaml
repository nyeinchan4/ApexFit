# ============================================================
# apexfit-database — values-dev.yaml
# Development overrides for the database sub-chart.
# Usage (standalone):
#   helm install apexfit-db ./helm/apexfit-database \
#     -f helm/apexfit-database/values-dev.yaml
#
# ⚠️  DEV ONLY — postgres password is stored here in plain text.
#     Production uses AWS RDS — no postgres sub-chart needed.
#     JWT secrets are managed via SealedSecret (sealed-secret.yaml).
# ============================================================

# ─── Namespace ────────────────────────────────────────────
namespace:
  name: apexfit

# ─── Shared JWT credentials ───────────────────────────────
# ✅ SEALED SECRETS: apexfit-database-secrets (DB creds + JWTs) is managed
# as a SealedSecret in helm/apexfit-database/templates/sealed-secret.yaml.
# To rotate: update .secrets.env → run scripts/rotate-sealed-secret.sh → git push
# Values below are unused but kept so Helm schema validation passes.
secrets:
  jwtAccessSecret: "UNUSED_MANAGED_BY_SEALED_SECRETS"
  jwtRefreshSecret: "UNUSED_MANAGED_BY_SEALED_SECRETS"

# ─── PostgreSQL (Bitnami sub-chart) ───────────────────────
# ⚠️  DEV ONLY: password stored here so ArgoCD always syncs the correct
# value without manual patching. Production → AWS RDS (this block unused).
postgresql:
  enabled: true
  image:
    tag: latest          # Bitnami free-tier doesn't publish versioned tags

  auth:
    username: postgres
    password: "DT3j3ZwhdLvBrqK7RpqzYGtpu_qFJZfk0cDNk3tX0d8"  # dev only
    database: apexfit_users

  primary:
    initdb:
      scripts:
        init-db.sql: |
          SELECT 'CREATE DATABASE apexfit_memberships'
          WHERE NOT EXISTS (
              SELECT FROM pg_database WHERE datname = 'apexfit_memberships'
          )\gexec

          SELECT 'CREATE DATABASE apexfit_admin'
          WHERE NOT EXISTS (
              SELECT FROM pg_database WHERE datname = 'apexfit_admin'
          )\gexec

    persistence:
      enabled: true
      size: 1Gi           # smaller PVC for dev

    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"

# ─── External PostgreSQL (disabled in dev) ────────────────
externalPostgresql:
  host: ""
  port: 5432
