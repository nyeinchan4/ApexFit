{{- if .Values.membershipService.enabled }}
{{- $svc := .Values.membershipService }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ $svc.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "apexfit-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $svc.name }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      {{- include "apexfit-backend.selectorLabels" (dict "component" $svc.name "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "apexfit-backend.selectorLabels" (dict "component" $svc.name "Release" .Release) | nindent 8 }}
        app.kubernetes.io/component: {{ $svc.name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $svc.name }}
          image: {{ include "apexfit-backend.image" (dict "svc" $svc "Values" .Values) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              protocol: TCP
          env:
            # ── Non-secret env vars ──────────────────────────
            {{- range $k, $v := $svc.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            # ── Database connection ──────────────────────────
            - name: DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            # ── Secrets (from shared Secret) ─────────────────
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sharedSecretName }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sharedSecretName }}
                  key: DB_PASSWORD
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sharedSecretName }}
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sharedSecretName }}
                  key: JWT_REFRESH_SECRET
          livenessProbe:
            httpGet:
              path: {{ $svc.livenessProbe.path }}
              port: {{ $svc.port }}
            initialDelaySeconds: {{ $svc.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ $svc.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ $svc.livenessProbe.timeoutSeconds | default 15 }}
            failureThreshold: {{ $svc.livenessProbe.failureThreshold | default 5 }}
          readinessProbe:
            httpGet:
              path: {{ $svc.readinessProbe.path }}
              port: {{ $svc.port }}
            initialDelaySeconds: {{ $svc.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ $svc.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ $svc.readinessProbe.timeoutSeconds | default 15 }}
            failureThreshold: {{ $svc.readinessProbe.failureThreshold | default 5 }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
{{- end }}
---
{{- if .Values.membershipService.enabled }}
{{- $svc := .Values.membershipService }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-{{ $svc.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "apexfit-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $svc.name }}
spec:
  type: {{ $svc.service.type }}
  selector:
    {{- include "apexfit-backend.selectorLabels" (dict "component" $svc.name "Release" .Release) | nindent 4 }}
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
      protocol: TCP
      name: http
{{- end }}
