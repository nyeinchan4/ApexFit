{{/*
  Service alias: release-1-api-gateway
  
  The admin-portal and member-app Docker images were built with nginx configs
  that hardcode "release-1-api-gateway" as the upstream hostname.
  This ExternalName Service creates that DNS alias, pointing to the real
  api-gateway Service so Nginx can resolve it without rebuilding the images.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: release-1-api-gateway
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "apexfit-frontend.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway-alias
  annotations:
    helm.sh/note: "Alias required by nginx upstream hardcoded in frontend Docker images"
spec:
  type: ExternalName
  # Points to the real api-gateway service in the same namespace.
  # Format: <svc-name>.<namespace>.svc.cluster.local
  # Override apiGatewayServiceName in values if your backend release name differs.
  externalName: {{ .Values.apiGatewayAlias.targetService }}.{{ .Values.namespace.name }}.svc.cluster.local
  ports:
    - port: {{ .Values.apiGatewayAlias.port }}
      targetPort: {{ .Values.apiGatewayAlias.port }}
      protocol: TCP
      name: http
