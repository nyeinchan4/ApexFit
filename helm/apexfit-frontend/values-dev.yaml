# ============================================================
# apexfit-frontend — values-dev.yaml
# Development overrides for the frontend sub-chart.
# Usage (standalone):
#   helm install apexfit-fe ./helm/apexfit-frontend \
#     -f helm/apexfit-frontend/values-dev.yaml
#
# NOTE: The backend sub-chart must be running first.
#       API_GATEWAY_HOST should match:
#       <backend-release-name>-api-gateway
# ============================================================

# ─── Namespace ────────────────────────────────────────────
namespace:
  name: apexfit

# ─── Global image settings ────────────────────────────────
global:
  imageRegistry: ""
  imagePullSecrets: []

image:
  pullPolicy: Always      # always pull latest in dev
  tag: latest

# ─── Frontend: admin-portal ───────────────────────────────
adminPortal:
  enabled: true
  name: admin-portal
  image:
    repository: nyeinchan468/apexfit-admin-portal
    tag: "latest"
  replicaCount: 1
  port: 80
  env:
    # Must match: <backend-release-name>-api-gateway
    API_GATEWAY_HOST: "apexfit-be-api-gateway"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  service:
    type: ClusterIP
  livenessProbe:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20
  readinessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10

# ─── Frontend: member-app ─────────────────────────────────
memberApp:
  enabled: true
  name: member-app
  image:
    repository: nyeinchan468/apexfit-member-app
    tag: "latest"
  replicaCount: 1
  port: 80
  env:
    # Must match: <backend-release-name>-api-gateway
    API_GATEWAY_HOST: "apexfit-be-api-gateway"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  service:
    type: ClusterIP
  livenessProbe:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20
  readinessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
